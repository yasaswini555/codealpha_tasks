<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator</title>
    <style>
        /* --- GENERAL STYLING & UTILITIES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }

        /* --- CALCULATOR CONTAINER --- */
        .calculator {
            background-color: #1e222b;
            width: 360px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        /* --- DISPLAY SCREEN --- */
        .display-screen {
            background-color: #13161c;
            padding: 20px;
            border-radius: 20px;
            text-align: right;
            margin-bottom: 25px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            word-break: break-all;
            word-wrap: break-word;
        }

        .display-screen .formula {
            font-size: 16px;
            color: #7f8c8d;
            min-height: 24px;
        }

        .display-screen .output {
            font-size: 40px;
            color: #ffffff;
            font-weight: 300;
            overflow-x: auto;
            white-space: nowrap;
        }

        .display-screen .output::-webkit-scrollbar {
            height: 4px;
        }
        .display-screen .output::-webkit-scrollbar-thumb {
            background-color: #34495e;
            border-radius: 2px;
        }

        /* --- BUTTONS GRID CONTAINER --- */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            padding: 20px 0;
            font-size: 22px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background-color: #2d323d;
            color: #ffffff;
            font-weight: 600;
            transition: all 0.15s ease;
            outline: none;
            user-select: none;
            aspect-ratio: 1;
        }

        button:hover {
            background-color: #3d4453;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.95);
        }

        button.operator {
            color: #ff9f0a;
            background-color: #2d323d;
            font-size: 26px;
        }
        button.operator:hover {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        button.functional {
            color: #ff3b30;
            background-color: #2d323d;
        }
        button.functional:hover {
            background-color: #ff3b30;
            color: #ffffff;
        }

        button.equal {
            background-color: #ff9f0a;
            color: #ffffff;
        }
        button.equal:hover {
            background-color: #fca922;
            box-shadow: 0 0 15px rgba(255, 159, 10, 0.4);
        }

        button.zero-btn {
            grid-column: span 2;
            border-radius: 40px;
            aspect-ratio: auto;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-screen">
            <div class="formula" id="formula-view"></div>
            <div class="output" id="output-view">0</div>
        </div>

        <div class="buttons-grid">
            <button class="functional" onclick="clearAll()">AC</button>
            <button class="functional" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="zero-btn" onclick="appendNumber('0')">0</button>
            <button onclick="appendDecimal('.')">.</button>
            <button class="equal" onclick="evaluateCalculation()">=</button>
        </div>
    </div>

    <script>
        const formulaView = document.getElementById('formula-view');
        const outputView = document.getElementById('output-view');

        let currentInput = '0';
        let previousInput = '';
        let operator = '';
        let isCalculated = false;

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = '';
            isCalculated = false;
            updateDisplay();
        }

        function deleteLast() {
            if (isCalculated) {
                clearAll();
                return;
            }
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function appendNumber(number) {
            if (isCalculated) {
                currentInput = number;
                isCalculated = false;
            } else {
                if (currentInput === '0') {
                    currentInput = number;
                } else {
                    currentInput += number;
                }
            }
            updateDisplay();
        }

        function appendDecimal(dot) {
            if (isCalculated) {
                currentInput = '0.';
                isCalculated = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes('.')) {
                currentInput += dot;
                updateDisplay();
            }
        }

        function appendOperator(op) {
            // If operator already set and no new number entered, just change operator
            if (operator && currentInput === '' && !isCalculated) {
                operator = op;
                updateDisplay();
                return;
            }

            // If we have a previous operator and a new number, evaluate first
            if (operator && currentInput !== '' && !isCalculated) {
                evaluateCalculation();
            }

            if (isCalculated) {
                isCalculated = false;
            }

            // Special percent behavior: if no current number, treat as percent of previous
            if (op === '%' && currentInput === '' && previousInput !== '') {
                const prev = parseFloat(previousInput);
                if (!isNaN(prev)) {
                    currentInput = (prev * 0.01).toString();
                    formulaView.innerText = `${previousInput} %`;
                    isCalculated = true;
                    updateDisplay();
                }
                return;
            }

            previousInput = currentInput;
            operator = op;
            currentInput = '';
            updateDisplay();
        }

        function evaluateCalculation() {
            if (!operator || currentInput === '') return;

            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(current)) return;

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        result = "Error";
                    } else {
                        result = prev / current;
                    }
                    break;
                case '%':
                    result = prev % current;
                    break;
                default:
                    return;
            }

            if (typeof result === 'number' && !Number.isInteger(result)) {
                result = Math.round(result * 100000000) / 100000000;
            }

            formulaView.innerText = `${previousInput} ${getOperatorSymbol(operator)} ${currentInput} =`;
            currentInput = result.toString();
            operator = '';
            previousInput = '';
            isCalculated = true;
            updateDisplay();
        }

        function getOperatorSymbol(op) {
            if (op === '*') return '×';
            if (op === '/') return '÷';
            return op;
        }

        function updateDisplay() {
            outputView.innerText = currentInput || '0';

            if (operator && !isCalculated && currentInput === '') {
                formulaView.innerText = `${previousInput} ${getOperatorSymbol(operator)}`;
            } else if (operator && !isCalculated) {
                formulaView.innerText = `${previousInput} ${getOperatorSymbol(operator)}`;
            } else if (!isCalculated) {
                formulaView.innerText = '';
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal('.');
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/' || e.key === '%') {
                appendOperator(e.key);
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                evaluateCalculation();
            }
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
